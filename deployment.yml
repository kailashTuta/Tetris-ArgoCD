apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-app
  labels:
    app: tetris
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teris
  template:
    metadata:
      labels:
        app: tetris
    spec:
      containers:
        - name: weather-container
          image: kailashtuta/tetris:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
