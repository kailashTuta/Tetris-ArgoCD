apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-app-blue
  labels:
    app: tetris
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tetris
      version: blue
  template:
    metadata:
      labels:
        app: tetris
        version: blue
    spec:
      containers:
        - name: tetris-container
          image: kailashtuta/tetris:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
